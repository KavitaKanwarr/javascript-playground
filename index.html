<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Practice Playground</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: "Comic Sans MS", cursive, sans-serif;
        background: #ffecf7;
        margin: 0;
        min-height: 100vh;
        padding: 2rem;
    }

    h1 {
        text-align: center;
        color: #333;
        transform: rotate(-1deg);
    }

    .container {
        max-width: 900px;
        margin: auto;
    }

    .card {
        border: 3px solid #ff96c4;
        border-radius: 24px;
        padding: 2rem;
        box-shadow: 0 10px 20px #ff6fad;
    }

    .subtitle {
        text-align: center;
        margin-bottom: 2rem;
        color: #666;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
        gap: 1rem;
    }

    .btn {
        border: 3px solid #bfc8ff;
        border-radius: 18px;
        padding: 1rem;
        background: #f5f6ff;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.2s;
        box-shadow: 0 5px 6px #bfc8ff;
    }

    .btn:hover {
        transform: translate(0, -2px);
        box-shadow: 0 5px 10px #788aff;
    }

    .btn.active {
        background: #d5dbff;
    }

    .status {
        margin-top: 2rem;
        padding: 1rem;
        border: 2px dashed #444;
        border-radius: 12px;
        text-align: center;
        font-weight: bold;
    }

    .doodle {
        font-size: 2rem;
        text-align: center;
        margin-bottom: 1rem;
    }
</style>
</head>
<body>

<div class="container">

    <div class="doodle">✨ 🚀 ✨</div>

    <h1>Javascript Practice Playground</h1>

    <div class="card">

        <p class="subtitle">
            Click a topic to load its script
        </p>

        <div class="grid" id="buttons"></div>

        <div class="status" id="status">
            No script loaded yet 👀
        </div>

    </div>

</div>

<script>
const scripts = [
  {
    name: "Hoisting",
    file: "hoisting.js",
  },
  {
    name: "Primitive vs Reference Types",
    file: "primitiveReferenceTypes.js",
  },
  {
    name: "Shallow vs Deep Copy",
    file: "shallowDeepCopy.js",
  },
  {
    name: "Type Coercion",
    file: "coercion.js",
  },
  {
    name: "Operators",
    file: "operators.js",
  },
  {
    name: "Promises",
    file: "promises.js",
  },
  {
    name: "Async / Await",
    file: "asyncAwait.js",
  },
  {
    name: "Understanding 'this'",
    file: "thisConcepts.js",
  },
  {
    name: "Currying",
    file: "currying.js",
  },
];

const buttonsContainer = document.getElementById("buttons");
const status = document.getElementById("status");

let currentScriptTag = null;

scripts.forEach(({ name, file }) => {
  const btn = document.createElement("button");

  btn.className = "btn";
  btn.textContent = name;

  btn.addEventListener("click", () => {
    document
      .querySelectorAll(".btn")
      .forEach((btn) => btn.classList.remove("active"));

    btn.classList.add("active");

    if (currentScriptTag) {
      currentScriptTag.remove();
    }

    const script = document.createElement("script");
    script.src = file;

    document.body.appendChild(script);

    currentScriptTag = script;

    status.textContent = `✅ Loaded: ${name}`;
  });

  buttonsContainer.appendChild(btn);
});
</script>

</body>
</html>
